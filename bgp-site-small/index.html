<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGTI 桌游人格测试</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.container { width: 100%; max-width: 500px; background: #fff; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
.header { background: linear-gradient(135deg, #4a7dff 0%, #6b5ce7 100%); color: #fff; padding: 40px 30px; text-align: center; }
.header h1 { font-size: 28px; margin-bottom: 8px; }
.header p { font-size: 16px; opacity: 0.9; }
.content { padding: 30px; }
.btn-group { display: flex; flex-direction: column; gap: 16px; margin-top: 20px; }
.btn { padding: 16px 24px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
.btn:hover { transform: translateY(-2px); }
.btn-primary { background: linear-gradient(135deg, #4a7dff, #6b5ce7); color: #fff; }
.btn-secondary { background: #f0f2ff; color: #4a7dff; border: 2px solid #4a7dff; }
.progress { margin-bottom: 20px; }
.progress-text { font-size: 14px; color: #888; margin-bottom: 8px; }
.progress-bar { height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #4a7dff, #6b5ce7); transition: width 0.3s; }
.question { font-size: 16px; font-weight: bold; color: #1a1a2e; line-height: 1.6; margin-bottom: 20px; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option { padding: 14px 16px; background: #f8f9fa; border: 2px solid transparent; border-radius: 10px; font-size: 14px; line-height: 1.5; cursor: pointer; transition: all 0.2s; text-align: left; }
.option:hover { background: #e8f0ff; border-color: #4a7dff; }
.option.selected { background: #e8f0ff; border-color: #4a7dff; color: #4a7dff; font-weight: bold; }
.option .label { font-weight: bold; margin-right: 8px; }
.btn-nav { display: flex; gap: 12px; margin-top: 20px; }
.btn-back { background: #f0f2ff; color: #666; flex: 1; }
.btn-next { background: linear-gradient(135deg, #4a7dff, #6b5ce7); color: #fff; flex: 2; }
.quick-intro { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 16px; padding: 14px; background: #f8f9fa; border-radius: 10px; }
.quick-intro code { background: #e8f0ff; padding: 2px 6px; border-radius: 4px; color: #4a7dff; }
textarea { width: 100%; height: 200px; padding: 14px; font-size: 14px; border: 2px solid #e8e8e8; border-radius: 10px; resize: none; font-family: inherit; line-height: 1.8; }
textarea:focus { outline: none; border-color: #4a7dff; }
.input-hint { font-size: 12px; color: #888; margin-top: 8px; }
.result-summary { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
.result-type { font-size: 14px; opacity: 0.8; margin-bottom: 8px; }
.result-name { font-size: 32px; font-weight: bold; margin-bottom: 12px; }
.result-tags { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.result-tag { background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; font-size: 13px; }
.result-type-code { font-size: 18px; color: #1a1a2e; margin: 16px 0; text-align: center; }
.result-desc { font-size: 14px; color: #4a4a5e; line-height: 1.7; padding: 0 20px 20px; }
.radar-container { padding: 16px; display: flex; justify-content: center; }
.btn-restart { background: #f0f2ff; color: #4a7dff; margin: 16px 20px; width: calc(100% - 40px); }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <!-- 首页 -->
  <div id="page-home">
    <div class="header">
      <h1>🎲 BGTI 桌游人格测试</h1>
      <p>测测你是哪种桌游玩家</p>
    </div>
    <div class="content">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startNormal()">🎮 开始测试</button>
        <button class="btn btn-secondary" onclick="startQuick()">⚡ 快捷测试</button>
      </div>
    </div>
  </div>

  <!-- 逐题测试页 -->
  <div id="page-normal" class="hidden">
    <div class="content">
      <div class="progress">
        <div class="progress-text">第 <span id="q-num">1</span> / 20 题</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width: 5%"></div></div>
      </div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div class="btn-nav">
        <button class="btn btn-back" onclick="prevQ()">上一题</button>
        <button class="btn btn-next" onclick="nextQ()">下一题</button>
      </div>
    </div>
  </div>

  <!-- 快捷测试页 -->
  <div id="page-quick" class="hidden">
    <div class="content">
      <div class="quick-intro">
        输入你的20个答案字母，每行一个。<br>
        例如：<code>A B C D A B C D A B C D A B C D A B C D</code><br><br>
        对应题目：Q1→Q20，每个答案从 A/B/C/D 中选择。
      </div>
      <textarea id="quick-input" placeholder="A B C D A B C D A B C D A B C D A B C D"></textarea>
      <div class="input-hint">答案之间用空格、换行或逗号分隔均可</div>
      <div class="btn-nav">
        <button class="btn btn-back" onclick="showHome()">返回</button>
        <button class="btn btn-next" onclick="submitQuick()">查看结果</button>
      </div>
    </div>
  </div>

  <!-- 结果页 -->
  <div id="page-result" class="hidden">
    <div class="result-summary">
      <div class="result-type">你是</div>
      <div class="result-name" id="result-name"></div>
      <div class="result-tags" id="result-tags"></div>
    </div>
    <div class="result-type-code" id="result-type-code"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="radar-container">
      <canvas id="radar" width="280" height="280"></canvas>
    </div>
    <div style="padding: 0 20px;">
      <div id="result-relations" style="display: flex; gap: 12px; margin-bottom: 16px;"></div>
      <div id="result-hidden"></div>
    </div>
    <button class="btn btn-restart" onclick="restart()">🔄 再测一次</button>
  </div>
</div>

<script>
// 题目数据
var questions = [
  { id: 1, dim: 'S', multi: false, q: "面对一个有多条胜利路径的游戏，你更倾向于：", options: [{label:'A',text:'列出每条路径的期望收益，选EV最高的',score:2},{label:'B',text:'凭感觉选一条看起来有趣的路线',score:0},{label:'C',text:'模仿上一局赢家的打法',score:-1},{label:'D',text:'随便选，反正都能玩',score:-2}] },
  { id: 2, dim: 'S', multi: true, q: "如果这个月你只能玩一天桌游，你想玩什么？（选2个）", options: [{label:'A',text:'德式策略（波多黎各、方舟动物园）',score:2},{label:'B',text:'美式主题（诡镇奇谈、阿瑞迪亚）',score:0},{label:'C',text:'派对游戏（出神入画、行动代号）',score:-1},{label:'D',text:'抽象棋类（战争之匣、圈套棋）',score:1}] },
  { id: 3, dim: 'S', multi: false, q: "游戏中需要长远规划时，你通常：", options: [{label:'A',text:'制定5轮以上的详细计划，每步有预案',score:2},{label:'B',text:'只规划接下来1-2轮，保持灵活',score:0},{label:'C',text:'走一步看一步，见招拆招',score:-1},{label:'D',text:'看别人怎么做，跟着走不费力',score:-1}] },
  { id: 4, dim: 'N', multi: true, q: "你选择游戏时，最看重什么？（选2个）", options: [{label:'A',text:'机制深度和策略性',score:-2},{label:'B',text:'主题吸引力和代入感',score:2},{label:'C',text:'美术设计和配件颜值',score:1},{label:'D',text:'游戏时长和上手难度',score:-1}] },
  { id: 5, dim: 'N', multi: false, q: "在角色扮演类游戏中，你：", options: [{label:'A',text:'会为角色编造背景故事，用角色语气说话',score:2},{label:'B',text:'按规则扮演，但不额外创作',score:0},{label:'C',text:'只关注角色能力值，故事是什么？',score:-1},{label:'D',text:'觉得角色扮演有点尴尬，能不演就不演',score:-2}] },
  { id: 6, dim: 'N', multi: false, q: "游戏结束后，你更可能：", options: [{label:'A',text:'讨论刚才发生的精彩故事和名场面',score:2},{label:'B',text:'分析胜负关键和策略得失',score:-1},{label:'C',text:'马上开下一局，废话少说',score:-1},{label:'D',text:'回味游戏的整体氛围和体验',score:1}] },
  { id: 7, dim: 'C', multi: false, q: "游戏对你来说最重要的是：", options: [{label:'A',text:'获胜！这是游戏存在的意义',score:2},{label:'B',text:'享受过程，输赢无所谓',score:-2},{label:'C',text:'和朋友在一起的时光',score:-1},{label:'D',text:'学习和提高技巧的过程',score:1}] },
  { id: 8, dim: 'C', multi: false, q: "当你明显落后时，你会：", options: [{label:'A',text:'更加认真，找翻盘机会，不到最后不放弃',score:2},{label:'B',text:'开始尝试有趣但不高效的"快乐玩法"',score:-1},{label:'C',text:'帮领先者快点结束，早点开下一局',score:-2},{label:'D',text:'复盘分析落后原因，下次改进',score:1}] },
  { id: 9, dim: 'C', multi: false, q: "第一次玩新游戏（教学局），你会：", options: [{label:'A',text:'依然全力争胜，教学归教学',score:2},{label:'B',text:'以熟悉规则为主，胜负随意',score:0},{label:'C',text:'故意让着新手，帮ta建立信心',score:-1},{label:'D',text:'各种操作都试一遍，当实验局',score:1}] },
  { id: 10, dim: 'O', multi: false, q: "周末想玩桌游时，你通常：", options: [{label:'A',text:'主动群发消息组局，定时间地点',score:2},{label:'B',text:'私聊两三个常玩的朋友',score:1},{label:'C',text:'等别人发起，有局就参加',score:-1},{label:'D',text:'自己去桌游店碰运气',score:0}] },
  { id: 11, dim: 'O', multi: false, q: "确定游戏时间和地点时，你：", options: [{label:'A',text:'积极协调所有人的时间，找最优解',score:2},{label:'B',text:'提供建议，但不强求',score:1},{label:'C',text:'听从安排，我都可以',score:-1},{label:'D',text:'希望别人全安排好，我人到就行',score:-2}] },
  { id: 12, dim: 'O', multi: false, q: "新游戏到货后，你：", options: [{label:'A',text:'当天就约人开箱试玩',score:2},{label:'B',text:'先研究规则，找合适机会再开',score:1},{label:'C',text:'放在柜子里，等有人提出想玩',score:-1},{label:'D',text:'先自己开箱把玩配件，爽一下',score:0}] },
  { id: 13, dim: 'T', multi: false, q: "在谈判/交易类游戏中，你：", options: [{label:'A',text:'积极发起交易，每笔都要占便宜',score:2},{label:'B',text:'等待别人来找我，被动回应',score:0},{label:'C',text:'尽量自给自足，能不交易就不交易',score:-1},{label:'D',text:'交易只为聊天社交，赚亏无所谓',score:1}] },
  { id: 14, dim: 'T', multi: true, q: "你更享受哪2种互动？（选2个）", options: [{label:'A',text:'心理博弈和虚张声势，骗到人超爽',score:2},{label:'B',text:'策略配合和团队协作',score:0},{label:'C',text:'独立思考，安静做自己的决策',score:-1},{label:'D',text:'轻松闲聊和玩笑，游戏只是聊天借口',score:1}] },
  { id: 15, dim: 'B', multi: false, q: "你购买桌游的频率大约是：", options: [{label:'A',text:'每月都买，看见心动就下单',score:2},{label:'B',text:'每季度买1-2款，有规划地入',score:1},{label:'C',text:'每年只买几款特别想要的',score:-1},{label:'D',text:'很少买，主要蹭别人的玩',score:-2}] },
  { id: 16, dim: 'B', multi: true, q: "买桌游时，你一般怎么选？（选2个）", options: [{label:'A',text:'游戏性和重开率，玩10次就是十倍性价比！',score:0},{label:'B',text:'美术颜值和主题吸引力，不好玩也是好看的砖！',score:1},{label:'C',text:'朋友推荐和圈内热度，大家说好的不会错！',score:-1},{label:'D',text:'价格和性价比，便宜也有好货！',score:-2}] },
  { id: 17, dim: 'egg_S', multi: true, egg: true, q: "约好大家分别看规则，结果下班到家已经很晚了——（选2个）", options: [{label:'A',text:'毕竟每次都是我来主讲，熬夜也要看完！',tag:'规则判官',score:2},{label:'B',text:'明天路上看视频学一下呗，这游戏能有多难',tag:'洒脱派',score:-1},{label:'C',text:'第二天早起，通读规则，关键机制拍下来存手机',tag:'钻研实干家',score:1},{label:'D',text:'反正他们也会看，让他们讲呗',tag:'蹭局型',score:-2}] },
  { id: 18, dim: 'egg_B', multi: true, egg: true, q: "看到有人把你的卡牌折角了，你内心OS是什么？（选2个）", options: [{label:'A',text:'立刻要求赔偿',tag:'配件守护神',score:2},{label:'B',text:'心在滴血，但嘴上说"没事没事"',tag:'隐忍心痛者',score:1},{label:'C',text:'"游戏就是用来玩的嘛"——真心话',tag:'洒脱圣人',score:-2},{label:'D',text:'挥出正义铁拳，但还是打个哈哈过去了',tag:'自我牺牲型选手',score:0}] },
  { id: 19, dim: 'egg_O', multi: true, egg: true, q: "有人说"咱们玩点简单的吧"，你的理解是？（选2个）", options: [{label:'A',text:'简单的是说轻策游戏吗？可以的',tag:'策略原教旨主义者',score:2},{label:'B',text:'他累了，那可以玩聚会游戏！没问题！',tag:'派对快乐狗',score:1},{label:'C',text:'完了，又要陪人玩小辣鸡了',tag:'社交疲劳症',score:-1},{label:'D',text:'"简单"是什么？喝杯咖啡给我继续重德！',tag:'硬核受虐狂',score:0}] },
  { id: 20, dim: 'egg', multi: false, egg: true, q: "终极灵魂拷问：如果必须选一个——", options: [{label:'A',text:'永远不能赢，但每次都超开心',tag:'快乐输家',score:0},{label:'B',text:'每次都能赢，但没人愿意和你玩',tag:'孤独赢家',score:0},{label:'C',text:'只能玩一款游戏，但能玩到极致',tag:'专一大师',score:0},{label:'D',text:'玩遍所有游戏，但永远是新手上路',tag:'永恒萌新',score:0}] }
];

// 人格数据
var personalities = {
  '解题机器': { icon: '🎯', type: 'SC', tags: ['规则判官', '洒脱派'], radar: [8.5, 4.2, 7.8, 5.5, 3.0, 4.8], desc: '开局前已备好三套方案，对手犯错前就知道他们会犯什么错。输了？概率问题，不是你的问题。把每局当考试，永远在备考状态。', bestMatch: { name: '故事说书人', desc: '你负责赢，他负责让这局有意思' }, worstMatch: { name: '气氛发动机', desc: '他要聊天，你要专注，频道错位' } },
  '规则学者': { icon: '📖', type: 'SN', tags: ['钻研实干家', '规则判官'], radar: [7.2, 8.1, 5.5, 4.8, 4.2, 5.0], desc: '认真读完全部规则书，读完还会说"哇这个世界观设计得真不错"。问你"好不好玩"，回答不少于三百字。', bestMatch: { name: '美术氪金狗', desc: '你提供深度，他提供美感' }, worstMatch: { name: '桌面嘴炮王', desc: '你想讲规则，他想开始聊交易' } },
  '棋盘角斗士': { icon: '⚔️', type: 'SO', tags: ['硬核受虐狂', '策略原教旨主义者'], radar: [8.0, 3.5, 8.5, 7.5, 4.0, 5.0], desc: '你组局不是为了玩，是为了找到足够强的对手。进你的局要准备好全力以赴。', bestMatch: { name: '胜利方程式', desc: '互相理解，都很认真' }, worstMatch: { name: '路人甲', desc: '他不认真，你很崩溃' } },
  '世界观收藏家': { type: 'NS', tags: ['永恒萌新', '洒脱圣人'], radar: [6.5, 8.8, 4.5, 4.0, 5.5, 7.0], desc: '每款游戏的背景设定都是一个值得深入探索的平行宇宙。你的书柜上摆的不是游戏，是你精心收藏的宇宙。', bestMatch: { name: '故事说书人', desc: '都爱剧情，相处愉快' }, worstMatch: { name: '解题机器', desc: '"别世界观了，你就说规则"' } },
  '故事说书人': { type: 'NT', tags: ['派对快乐狗', '角色扮演疯子'], radar: [4.0, 8.5, 4.5, 5.5, 7.5, 5.0], desc: '每局结束后，你能把它复述成一段引人入胜的故事。朋友打完牌，你还在讲"当时那一刻"——而且大家都愿意听。', bestMatch: { name: '角色扮演疯子', desc: '两人组成最强叙事duo' }, worstMatch: { name: '解题机器', desc: '你在讲故事，他在算收益' } },
  '美术氪金狗': { type: 'NB', tags: ['洒脱圣人', '颜控败家子'], radar: [3.5, 7.5, 3.0, 4.5, 5.0, 8.5], desc: '消费逻辑只有一条：好看就买。会为一幅主题绝美的画掏空钱包，然后摆在最显眼的位置。', bestMatch: { name: '测评博主', desc: '你提供审美，他提供深度' }, worstMatch: { name: '路人甲', desc: '你精心买的游戏，他随便玩玩' } },
  '胜利方程式': { type: 'CS', tags: ['硬核受虐狂', '钻研实干家'], radar: [8.8, 4.0, 9.0, 5.0, 4.5, 4.5], desc: '输掉一局时不是沮丧，而是困惑——明明算好了，怎么会输？研究策略不是兴趣，是刚需。', bestMatch: { name: '棋盘角斗士', desc: '都要求认真，天作之合' }, worstMatch: { name: '故事说书人', desc: '你要赢，他要讲故事' } },
  '桌面嘴炮王': { type: 'CT', tags: ['自我牺牲型选手', '社交疲劳症'], radar: [5.5, 4.0, 7.5, 5.0, 9.0, 4.0], desc: '真正的战场不在牌桌上，在嘴上。谈判技巧可以让别人用两个资源换你一个，还觉得自己赚了。', bestMatch: { name: '谈判勒索犯', desc: '两人同台，精彩程度翻倍' }, worstMatch: { name: '规则学者', desc: '他要讲规则，你要开打' } },

// 状态变量
var currentQ = 0;
var answers = {};
var hiddenTags = [];

// 页面切换
function showPage(id) {
  console.log('showPage called with:', id);
  var pages = ['page-home', 'page-normal', 'page-quick', 'page-result'];
  pages.forEach(function(p) {
    var el = document.getElementById(p);
    if (p === id) {
      el.classList.remove('hidden');
      console.log(p, 'now visible');
    } else {
      el.classList.add('hidden');
    }
  });
}

function showHome() { showPage('page-home'); }
function startNormal() { console.log('startNormal clicked'); answers = {}; hiddenTags = []; currentQ = 0; showPage('page-normal'); renderQuestion(); }
function startQuick() { console.log('startQuick clicked'); showPage('page-quick'); }

// 渲染题目
function renderQuestion() {
  var q = questions[currentQ];
  document.getElementById('q-num').textContent = currentQ + 1;
  document.getElementById('progress-fill').style.width = ((currentQ + 1) / 20 * 100) + '%';
  
  var qText = q.q;
  if (q.multi) {
    var answered = answers[q.id] || [];
    if (answered.length === 0) qText += '（请选择第一个）';
    else if (answered.length === 1) qText += '（请选择第二个）';
  }
  document.getElementById('question').textContent = qText;
  
  var container = document.getElementById('options');
  container.innerHTML = '';
  
  var answered = answers[q.id] || [];
  var availableOptions = q.options.filter(function(o) { return answered.indexOf(o.label) === -1; });
  
  availableOptions.forEach(function(opt) {
    var div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = '<span class="label">' + opt.label + '.</span> ' + opt.text;
    div.onclick = (function(label) { return function() { selectOption(label); }; })(opt.label);
    container.appendChild(div);
  });
  
  document.getElementById('page-normal').querySelector('.btn-back').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  document.getElementById('page-normal').querySelector('.btn-next').textContent = currentQ === 19 ? '查看结果' : '下一题';
}

function selectOption(label) {
  var q = questions[currentQ];
  if (!answers[q.id]) answers[q.id] = [];
  
  if (q.multi) {
    var idx = answers[q.id].indexOf(label);
    if (idx !== -1) answers[q.id].splice(idx, 1);
    else if (answers[q.id].length < 2) answers[q.id].push(label);
  } else {
    answers[q.id] = [label];
  }
  renderQuestion();
}

function prevQ() { if (currentQ > 0) { currentQ--; renderQuestion(); } }

function nextQ() {
  console.log('=== nextQ START ===');
  console.log('currentQ:', currentQ);
  console.log('questions length:', questions.length);
  console.log('questions[0]:', questions[0]);
  var q = questions[currentQ];
  console.log('q:', q);
  if (!q) {
    console.log('ERROR: q is undefined!');
    return;
  }
  var answered = answers[q.id] || [];
  console.log('answered:', answered);
  
  if (q.multi && answered.length < 2) { alert('请选择两个答案'); return; }
  if (!q.multi && answered.length === 0) { alert('请选择一个答案'); return; }
  
  if (currentQ < 19) { currentQ++; renderQuestion(); console.log('moved to:', currentQ); }
  else { showResult(); }
  console.log('=== nextQ END ===');
}

// 快捷测试提交
function submitQuick() {
  var input = document.getElementById('quick-input').value;
  var letters = input.replace(/[，。、，、\n\r\s]+/g, ' ').trim().split(' ').filter(function(l) { return l; });
  
  if (letters.length < 20) { alert('请输入20个答案，你只输入了' + letters.length + '个'); return; }
  
  answers = {};
  hiddenTags = [];
  questions.forEach(function(q, i) {
    var label = letters[i].toUpperCase();
    if (['A', 'B', 'C', 'D'].indexOf(label) !== -1) {
      answers[q.id] = [label];
    }
  });
  
  showResult();
}

// 计算结果
function calculate() {
  var dimScores = { S: 0, N: 0, C: 0, O: 0, T: 0, B: 0 };
  
  questions.forEach(function(q) {
    if (q.dim.startsWith('egg')) return;
    
    var answered = answers[q.id] || [];
    var score = 0;
    
    if (q.multi && answered.length === 2) {
      var firstOpt = q.options.find(function(o) { return o.label === answered[0]; });
      var secondOpt = q.options.find(function(o) { return o.label === answered[1]; });
      score = (firstOpt ? firstOpt.score : 0) + (secondOpt ? secondOpt.score * 0.5 : 0);
    } else if (answered.length > 0) {
      var opt = q.options.find(function(o) { return o.label === answered[0]; });
      score = opt ? opt.score : 0;
    }
    
    dimScores[q.dim] += score;
    
    if (q.egg && answered.length > 0) {
      var firstOpt = q.options.find(function(o) { return o.label === answered[0]; });
      if (firstOpt && firstOpt.tag) hiddenTags.push(firstOpt.tag);
    }
  });
  
  var normalized = {};
  ['S', 'N', 'C', 'O', 'T', 'B'].forEach(function(dim) {
    var raw = dimScores[dim];
    var isTB = dim === 'T' || dim === 'B';
    var min = isTB ? -4 : -6;
    var max = isTB ? 4 : 6;
    normalized[dim] = Math.max(0, Math.min(10, (raw - min) / (max - min) * 10));
  });
  
  var allHigh = Object.values(normalized).every(function(v) { return v >= 7; });
  var allLow = Object.values(normalized).every(function(v) { return v <= 3; });
  
  if (allHigh) return '六边形战士';
  if (allLow) return '路人甲';
  
  var sorted = Object.entries(normalized).sort(function(a, b) { return b[1] - a[1]; });
  var mainDim = sorted[0][0];
  var secondDim = sorted[1][0];
  
  var mapping = {
    'SC': '解题机器', 'SN': '规则学者', 'SO': '棋盘角斗士',
    'NS': '世界观收藏家', 'NT': '故事说书人', 'NB': '美术氪金狗',
    'CS': '胜利方程式', 'CT': '桌面嘴炮王', 'CO': '赛场主办方',
    'OT': '组局永动机', 'OB': '桌游传教士', 'ON': '体验导演人',
    'TC': '谈判勒索犯', 'TO': '气氛发动机', 'TN': '角色扮演疯子',
    'BS': '测评博主', 'BN': '颜控败家子', 'BO': '桌游安利狂'
  };
  
  return mapping[mainDim + secondDim] || '路人甲';
}

// 显示结果
function showResult() {
  var name = calculate();
  var data = personalities[name];
  
  showPage('page-result');
  
  document.getElementById('result-name').textContent = name;
  document.getElementById('result-tags').innerHTML = data.tags.map(function(t) { return '<span class="result-tag">' + t + '</span>'; }).join('');
  document.getElementById('result-type-code').textContent = '（' + data.type + '）';
  document.getElementById('result-desc').textContent = data.desc;
  
  document.getElementById('result-relations').innerHTML = 
    '<div style="flex:1; padding: 14px; background: #f0fff0; border-radius: 10px;">' +
      '<div style="font-size: 12px; color: #34c759; margin-bottom: 4px;">最佳搭子</div>' +
      '<div style="font-weight: bold;">' + data.bestMatch.name + '</div>' +
      '<div style="font-size: 13px; color: #666;">' + data.bestMatch.desc + '</div>' +
    '</div>' +
    '<div style="flex:1; padding: 14px; background: #fff0f0; border-radius: 10px;">' +
      '<div style="font-size: 12px; color: #ff3b30; margin-bottom: 4px;">天克冤家</div>' +
      '<div style="font-weight: bold;">' + data.worstMatch.name + '</div>' +
      '<div style="font-size: 13px; color: #666;">' + data.worstMatch.desc + '</div>' +
    '</div>';
  
  var hiddenHtml = hiddenTags.length > 0 
    ? '<div style="font-size: 13px; color: #888; margin-bottom: 8px;">🎭 你的隐藏属性</div>' +
      '<div style="display: flex; gap: 8px; flex-wrap: wrap;">' +
        hiddenTags.map(function(t) { return '<span style="background: #fff8e0; padding: 6px 12px; border-radius: 16px; font-size: 13px;">' + t + '</span>'; }).join('') +
      '</div>'
    : '';
  document.getElementById('result-hidden').innerHTML = hiddenHtml;
  
  drawRadar(data.radar);
}

function drawRadar(radar) {
  var canvas = document.getElementById('radar');
  var ctx = canvas.getContext('2d');
  var cx = 140, cy = 140, maxR = 90;
  var labels = ['策略', '剧情', '胜负', '组局', '嘴炮', '消费'];
  var n = 6;
  var step = Math.PI * 2 / n;
  var startAngle = -Math.PI / 2;
  
  ctx.clearRect(0, 0, 280, 280);
  
  // 画背景网格
  for (var i = 1; i <= 5; i++) {
    ctx.beginPath();
    for (var j = 0; j <= n; j++) {
      var angle = startAngle + step * j;
      var r = (i / 5) * maxR;
      ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  
  // 画轴线
  for (var k = 0; k < n; k++) {
    var angle = startAngle + step * k;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * maxR, cy + Math.sin(angle) * maxR);
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.stroke();
  }
  
  // 画数据
  ctx.beginPath();
  for (var m = 0; m <= n; m++) {
    var angle = startAngle + step * m;
    var val = radar[m % n];
    var r = (val / 10) * maxR;
    ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
  }
  ctx.fillStyle = 'rgba(74,125,255,0.2)';
  ctx.fill();
  ctx.strokeStyle = '#4a7dff';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // 画点
  for (var p = 0; p < n; p++) {
    var angle = startAngle + step * p;
    var val = radar[p];
    var r = (val / 10) * maxR;
    var x = cx + Math.cos(angle) * r;
    var y = cy + Math.sin(angle) * r;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#4a7dff';
    ctx.fill();
  }
  
  // 画标签
  for (var q = 0; q < n; q++) {
    var angle = startAngle + step * q;
    var labelR = maxR + 20;
    var x = cx + Math.cos(angle) * labelR;
    var y = cy + Math.sin(angle) * labelR;
    ctx.fillStyle = '#888';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[q], x, y);
  }
}

function restart() { showHome(); }
